# version: '1.0'

services:
  gpm_login_global_private_server_web:
    image: ngochoaitn/gpm-login-global-private-server:latest
    container_name: gpm_login_global_private_server_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - gpm_login_global_private_server_mysql
    volumes:
      - ./.env:/var/www/html/.env
      # mount all use for update code
      - gpm_login_global_private_server_web_storage:/var/www/html
      - ./apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
      - ./php/php_large_file_upload.ini:/usr/local/etc/php/conf.d/php_large_file_upload.ini

  gpm_login_global_private_server_mysql:
    image: 'mysql/mysql-server:8.0'
    container_name: gpm_login_global_private_server_mysql
    restart: unless-stopped
    environment:
        MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
        MYSQL_ROOT_HOST: '%'
        MYSQL_DATABASE: '${DB_DATABASE}'
        MYSQL_USER: '${DB_USERNAME}'
        MYSQL_PASSWORD: '${DB_PASSWORD}'
        MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
        - ./gpmlogin-global.sql:/docker-entrypoint-initdb.d/gpmlogin-global.sql
        - gpm_login_global_private_server_db_data:/var/lib/mysql

  gpm_login_global_private_server_phpmyadmin:
    container_name: gpm_login_global_private_server_phpmyadmin
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    ports:
        - "${PMA_PORT}:80"
    environment:
        - PMA_HOSTS=gpm_login_global_private_server_mysql
        - PMA_PORT=3306
        # - PMA_USER=${DB_USERNAME}
        # - PMA_PASSWORD=${DB_PASSWORD}

volumes:
    gpm_login_global_private_server_db_data:
        driver: local
        name: gpm_login_global_private_server_db_data
    gpm_login_global_private_server_web_storage:
        driver: local
        name: gpm_login_global_private_server_web_storage
        # driver_opts:
        #   type: none
        #   o: bind
        #   device: D:\profiles